name: SDD Compliance & CI Verification

on:
  pull_request:
    branches:
      - main
      - develop
      - 'module/m*'

jobs:
  sdd-audit:
    name: SDD Blueprint Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Spec-Driven Artifacts
        run: |
          echo "Scanning Pull Request for SDD compliance..."
          
          # Get list of modified files
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          echo "Changed files in this PR:"
          echo "$CHANGED_FILES"
          
          # Check if changes were made to modules M01 - M10
          if echo "$CHANGED_FILES" | grep -q "apps/api/src/modules/"; then
            echo "✅ Module code changes detected. Auditing design documents..."
            
            # Ensure SDD.md is present or has been reviewed/updated
            if ! echo "$CHANGED_FILES" | grep -q -E "SDD.md|.specify/specs/|.specify/plans/"; then
              echo "❌ ERROR: You have modified module code without updating your SDD.md, Spec file, or Technical Plan!"
              echo "SDD Framework enforces that specifications and plans must be updated in the same PR as the code."
              exit 1
            fi
            echo "✅ SDD design documents updated successfully."
          else
            echo "ℹ️ No module code changes detected. Skipping spec checks."
          fi

  syntax-and-ast:
    name: AST Syntax & Linting Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Validate Python and JSON AST
        run: |
          # Execute our custom syntax and AST validator script
          python "Boilerplate Setup/syntax_validator.py"

  database-and-compilation:
    name: Prisma Schema & Build Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install Dependencies
        run: |
          cd "Boilerplate Setup/r-revenue-intelligence"
          pnpm install

      - name: Validate Prisma Database Models
        run: |
          cd "Boilerplate Setup/r-revenue-intelligence"
          # Ensure tenantId is defined on all models (except allowed join/global models)
          SCHEMA_FILE="packages/database/prisma/schema.prisma"
          echo "Auditing Prisma schema models for Tenant Isolation..."
          
          # Compile NestJS api
          pnpm --filter api run build
